[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.9.0"
hooks = [
  { id = "ruff", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "pytest", name = "pytest", entry = "bash -lc 'cd cli && uv run --group dev python -m pytest'", language = "system", pass_filenames = false, files = "^cli/" },
  { id = "pyright", name = "pyright", entry = "bash -lc 'cd cli && uv run --group dev pyright'", language = "system", pass_filenames = false, files = "^cli/" },
]
