[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.9.0"
hooks = [
  { id = "ruff", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "biome-check", name = "biome check", entry = "bash -lc 'cd plugin && bun run lint'", language = "system", pass_filenames = false, files = "^plugin/" },
  { id = "biome-format", name = "biome format", entry = "bash -lc 'cd plugin && bun run format'", language = "system", pass_filenames = false, files = "^plugin/" },
  { id = "pytest", name = "pytest", entry = "bash -lc 'cd cli && uv run --group dev python -m pytest'", language = "system", pass_filenames = false, files = "^cli/" },
  { id = "pyright", name = "pyright", entry = "bash -lc 'cd cli && uv run --group dev pyright'", language = "system", pass_filenames = false, files = "^cli/" },
  { id = "bun-test", name = "bun test", entry = "bash -lc 'cd plugin && bun test'", language = "system", pass_filenames = false, files = "^plugin/" },
  { id = "tsc", name = "tsc", entry = "bash -lc 'cd plugin && bun x tsc --noEmit'", language = "system", pass_filenames = false, files = "^plugin/" },
]
